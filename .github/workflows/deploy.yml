name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/Home-Prices-API" ]; then
              cd /home/ubuntu
              git clone https://github.com/Shashank17singh/Home-Prices-API.git
            fi
            
            cd /home/ubuntu/Home-Prices-API
            git pull origin main
            
            # Stop and disable the old raw systemd service (if it's running)
            sudo systemctl stop bhp || true
            sudo systemctl disable bhp || true
            
            # Build and start the Docker containers
            docker compose up -d --build
